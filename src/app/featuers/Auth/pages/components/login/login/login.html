<section class="auth-wrapper" dir="rtl">
  <div class="login-card">
    
    <header class="card-header">
      <h1>تسجيل الدخول</h1>
      <p>مرحباً بك مجدداً! يرجى إدخال بياناتك.</p>
    </header>

    <button class="btn-google" type="button" (click)="onGoogleRegister()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
      المتابعة باستخدام Google
    </button>

    <div class="divider">
      <span>أو سجل بالبريد الإلكتروني</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <input type="email" id="email" formControlName="email" class="form-control" dir="ltr" style="text-align: right;" placeholder="mail@abc.com" [class.is-invalid]="f['email'].invalid && (f['email'].dirty || f['email'].touched)">
          <div *ngIf="f['email'].invalid && (f['email'].dirty || f['email'].touched)" class="error-text">
            <small *ngIf="f['email'].errors?.['required']">البريد الإلكتروني مطلوب.</small>
            <small *ngIf="f['email'].errors?.['email']">يرجى إدخال بريد إلكتروني صحيح.</small>
          </div>
        </div>

        <!-- كلمة المرور -->
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" formControlName="password" class="form-control" placeholder="••••••••••••" [class.is-invalid]="f['password'].invalid && (f['password'].dirty || f['password'].touched)">
          <div *ngIf="f['password'].invalid && (f['password'].dirty || f['password'].touched )" class="error-text">
            <small *ngIf="f['password'].errors?.['required']">كلمة المرور مطلوبة.</small>
            <small *ngIf="f['password'].errors?.['minlength']">يجب أن تتكون من 8 أحرف على الأقل.</small>
          </div>
        </div>
        <!-- <a routerLink="/forgot-password" class="link-sm">نسيت كلمة المرور؟</a> -->


      <button type="submit" class="btn-primary"  [disabled]="isLoading || loginForm.invalid">
        {{ isLoading ? 'جاري الدخول...' : 'دخول' }}
      </button>
    </form>

    <footer class="card-footer">
      <span>ليس لديك حساب؟</span>
      <a routerLink="/Auth/Register">إنشاء حساب جديد</a>
    </footer>

  </div>
</section>
